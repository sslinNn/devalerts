name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Build package
        run: uv build

      - name: Smoke-test the built wheel
        run: |
          uv run --with "$(ls dist/*.whl)" --no-project -- devalerts --version
          uv run --with "$(ls dist/*.whl)" --no-project -- python -c "
          import devalerts, pathlib
          p = pathlib.Path(devalerts.__file__).parent / 'py.typed'
          assert p.exists(), f'{p} missing from built wheel'
          "

      - name: Publish to PyPI
        run: uv publish